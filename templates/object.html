<!DOCTYPE html>
<html>
<head>
    <title>Object Detection</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        canvas {
            z-index: 2;
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>


<button onclick="goToCompare()" style="
position:absolute;
top:20px;
right:20px;
z-index:3;
padding:10px 20px;
font-size:16px;">
Compare Models
</button>
<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ========= VOICE ========= */

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

/* ========= COLOR GENERATOR ========= */

function getColor(label) {
    const colors = {
        // People & animals
        person: "#FF3B30",
        dog: "#FF9500",
        cat: "#FFCC00",
        bird: "#34C759",

        // Daily objects
        bottle: "#007AFF",
        cup: "#5AC8FA",
        bowl: "#5856D6",
        spoon: "#AF52DE",
        fork: "#FF2D55",
        knife: "#FF453A",

        // Furniture
        chair: "#30D158",
        couch: "#00C7BE",
        bed: "#64D2FF",
        dining_table: "#BF5AF2",

        // Electronics
        tv: "#0A84FF",
        laptop: "#5E5CE6",
        mouse: "#AC8E68",
        keyboard: "#FFD60A",
        cell_phone: "#FF9F0A",

        // Indoor stuff
        book: "#8E8E93",
        clock: "#FF375F",
        vase: "#32D74B",
        remote: "#FFD60A",

        // Food
        banana: "#FFE066",
        apple: "#FF453A",
        sandwich: "#D4A373",
        pizza: "#FF9F0A",

        // Transport
        car: "#FF2D55",
        bus: "#FF9500",
        bicycle: "#32ADE6",
        motorcycle: "#FF3B30"
    };

    return colors[label] || "#FFFF00"; // fallback
}

/* ========= START CAMERA ========= */

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
    speak("Camera started. Detecting objects.");
    startDetection();
})
.catch(() => {
    speak("Camera access denied");
});

/* ========= DETECTION LOOP ========= */

let lastSpoken = "";

function startDetection() {
    setInterval(async () => {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const blob = await new Promise(resolve =>
            canvas.toBlob(resolve, "image/jpeg")
        );

        const formData = new FormData();
        formData.append("image", blob, "frame.jpg");

        const res = await fetch("/detect", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw video frame again
        ctx.drawImage(video, 0, 0);

        let detectedNames = [];

        data.detections.forEach(det => {
            const [x1, y1, x2, y2] = det.box;
            const label = det.label;
            const conf = det.confidence;

            detectedNames.push(label);

            const color = getColor(label);

            // Draw box
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            // Draw label
            ctx.fillStyle = color;
            ctx.font = "18px Arial";
            ctx.fillText(`${label} (${conf})`, x1, y1 - 5);
        });

        // Remove duplicates
        detectedNames = [...new Set(detectedNames)];

        if (detectedNames.length > 0) {
            let sentence = "I see " + detectedNames.join(", ");

            if (sentence !== lastSpoken) {
                speak(sentence);
                lastSpoken = sentence;
            }
        }

    }, 2000); // slower = more stable
}

function goToCompare() {
    window.location.href = "/compare";
}
</script>

</body>
</html>
